<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./style.css">

</head>

<body>
    <header id="cabecario">
        <h1>
            Afazeres do dia!
        </h1>
        <h3>Óla hoje é (dia da semana do sistema), vamos lá!</h3>
    </header>

    <div>
        <input type="text" id="textAddTask">
        <button id="buttonTask" onclick="addTask(event)">Confirmar</button>
        <ul id="listaTarefas">
    </div>

    <div>
        <button id="btnLogin" onclick="handleLogin()">
            Conectar pelo Google 📅
        </button>
    </div>

    <div id="google-events-container" style="margin-top: 20px;">
        <h2>📅 Próximos Compromissos (Google Agenda)</h2>
        <ul id="listGoogle">
            <li>Faça login para carregar os compromissos da agenda...</li>
        </ul>
    </div>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="calendar.js"></script>
    <script src="auth.js"></script>
    <script src="main.js"></script>
    <script>
        window.onload = function () {
            if (typeof gisiInit === 'function') {
                gisiInit();
            }
        };
    </script>
</body>

</html>
